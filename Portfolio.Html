<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HTML5 Developer Project</title>

<!-- SEO Meta Tags -->
<meta name="description" content="Example webpage using semantic HTML, forms, accessibility and SEO basics">
<meta name="keywords" content="HTML5, Semantic HTML, Forms, Accessibility, SEO">
<meta name="author" content="Sanjay Goswami">

</head>     

<body>    

<header>
<h1>My HTML5 Webpage</h1>
</header>

<main>

<section>

<h2>Semantic HTML5 Elements</h2>

<p>
Semantic HTML elements like header, main, section and footer help define the structure of a webpage.
</p>

</section>

<section>

<h2>Accessibility Example</h2>

<img src="https://via.placeholder.com/200" alt="Accessibility example image">

<p>
Alt text helps screen readers understand images.
</p>

</section>

<section>

<h2>Contact Form</h2>

<form>

<label for="name">Name</label><br>
<input type="text" id="name" aria-label="Enter your name" required><br><br>

<label for="email">Email</label><br>
<input type="email" id="email" aria-label="Enter your email" required><br><br>

<label for="message">Message</label><br>
<textarea id="message" aria-label="Enter your message" required></textarea><br><br>

<button type="submit">Submit</button>

</form>

</section>

</main>

<footer>

<p>© 2026 Sanjay Goswami</p>

</footer>

</body>

</html>
