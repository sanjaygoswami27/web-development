<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Guaranteed Working</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        .input-group {
            position: relative;
            margin-bottom: 30px;
        }
        input {
            width: 75%;
            padding: 18px 25px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            background: rgba(255,255,255,0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            outline: none;
        }
        button {
            position: absolute;
            right: 8%;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            cursor: pointer;
            color: white;
            font-size: 20px;
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 12px 35px rgba(255,107,107,0.6);
        }
        .weather-box {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            margin-top: 20px;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.5s ease;
        }
        .weather-box.show {
            opacity: 1;
            transform: scale(1);
        }
        .city {
            font-size: 2.2em;
            color: #333;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .temp {
            font-size: 4em;
            color: #ff6b6b;
            font-weight: 300;
            margin-bottom: 10px;
        }
        .desc {
            font-size: 1.4em;
            color: #666;
            margin-bottom: 20px;
            text-transform: capitalize;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }
        .card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .label {
            color: #888;
            font-size: 0.9em;
        }
        .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }
        .error {
            color: #ff6b6b;
            font-size: 1.2em;
            padding: 20px;
            background: rgba(255,107,107,0.1);
            border-radius: 15px;
            border-left: 5px solid #ff6b6b;
        }
        .loading {
            color: white;
            font-size: 1.3em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather App</h1>
        <div class="input-group">
            <input type="text" id="cityInput" placeholder="Enter city name..." value="Delhi">
            <button onclick="searchWeather()">🔍</button>
        </div>
        <div id="result"></div>
    </div>

    <script>
        // 🔥 WORKING WITHOUT API KEY - Mock Data + Real API Support
        const MOCK_DATA = {
            'Delhi': {name: 'Delhi, IN', temp: 24, feels: 25, humidity: 65, wind: 12, desc: 'clear sky', icon: '☀️'},
            'Mumbai': {name: 'Mumbai, IN', temp: 29, feels: 31, humidity: 78, wind: 15, desc: 'broken clouds', icon: '☁️'},
            'Bangalore': {name: 'Bangalore, IN', temp: 22, feels: 23, humidity: 70, wind: 8, desc: 'light rain', icon: '🌦️'},
            'London': {name: 'London, GB', temp: 12, feels: 10, humidity: 85, wind: 18, desc: 'overcast clouds', icon: '☁️'},
            'New York': {name: 'New York, US', temp: 8, feels: 5, humidity: 72, wind: 20, desc: 'snow', icon: '❄️'}
        };

        async function searchWeather() {
            const cityInput = document.getElementById('cityInput');
            const result = document.getElementById('result');
            const city = cityInput.value.trim();

            if (!city) {
                result.innerHTML = '<div class="error">Please enter a city name!</div>';
                return;
            }

            result.innerHTML = '<div class="loading">🔄 Loading weather for ' + city + '...</div>';
            result.classList.add('weather-box', 'show');

            // Mock data for instant demo (no API needed)
            if (MOCK_DATA[city]) {
                setTimeout(() => showWeather(MOCK_DATA[city]), 1000);
                return;
            }

            // Real API call (optional)
            try {
                // Uncomment below if you have API key
                /*
                const API_KEY = 'your_api_key_here';
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`);
                if (!response.ok) throw new Error('City not found');
                const data = await response.json();
                showWeather({
                    name: `${data.name}, ${data.sys.country}`,
                    temp: Math.round(data.main.temp),
                    feels: Math.round(data.main.feels_like),
                    humidity: data.main.humidity,
                    wind: Math.round(data.wind.speed * 3.6),
                    desc: data.weather[0].description,
                    icon: getIcon(data.weather[0].main)
                });
                */
                
                // Fallback error for real API
                setTimeout(() => {
                    result.innerHTML = `
                        <div class="error">
                            🌍 ${city} - Demo Mode Active!<br>
                            <small>Try: Delhi, Mumbai, Bangalore, London, New York</small><br><br>
                            <strong>Want Real Data?</strong><br>
                            1. openweathermap.org → Free API Key<br>
                            2. Uncomment lines 137-147 above<br>
                            3. Paste your API key
                        </div>
                    `;
                }, 1500);
            } catch (error) {
                result.innerHTML = `<div class="error">City "${city}" not found! Try Delhi, Mumbai etc.</div>`;
            }
        }

        function showWeather(data) {
            const result = document.getElementById('result');
            result.innerHTML = `
                <div class="weather-box show">
                    <div class="city">${data.name}</div>
                    <div class="temp">${data.temp}°C ${data.icon}</div>
                    <div class="desc">${data.desc}</div>
                    <div class="grid">
                        <div class="card">
                            <div class="label">Feels like</div>
                            <div class="value">${data.feels}°C</div>
                        </div>
                        <div class="card">
                            <div class="label">Humidity</div>
                            <div class="value">${data.humidity}%</div>
                        </div>
                        <div class="card">
                            <div class="label">Wind</div>
                            <div class="value">${data.wind} km/h</div>
                        </div>
                    </div>
                </div>
            `;
        }

        function getIcon(condition) {
            const icons = {'Clear':'☀️','Clouds':'☁️','Rain':'🌧️','Snow':'❄️','Thunderstorm':'⛈️'};
            return icons[condition] || '🌤️';
        }

        // Enter key support
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchWeather();
        });

        // Auto load Delhi on start
        window.addEventListener('load', () => {
            setTimeout(() => searchWeather(), 500);
        });
    </script>
</body>
</html>
